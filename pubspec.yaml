name: mobile_assignment
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  awesome_dialog: ^3.3.0
  badges: ^3.1.2
  flutter:
    sdk: flutter
  flutter_bounceable: ^1.2.0
  google_fonts: ^6.3.3
  google_nav_bar: ^5.0.7
  image_picker: ^1.2.1
  intl: ^0.20.2
  introduction_screen: ^4.0.0
  path: ^1.9.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  shimmer_animation: ^2.2.2
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  smooth_page_indicator: ^2.0.1
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_bg.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "assets/images/logo_bg.png"
  adaptive_icon_foreground: "assets/images/logo_bg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/
    - assets/images/members/
